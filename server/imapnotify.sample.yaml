# mailpush · goimapnotify(监听)配置 —— 给 mail-watch 用(IMAP IDLE → onNewMail → push-fcm.py)。
# 复制为 /config/imapnotify.yaml 并改成你的账号。
#
# 与 himalaya 的 config.toml 各自独立,但引用【同一个】密钥文件 /config/secrets/*.pass。
# onNewMail 只带账号名(goimapnotify 不传 sender/subject);push-fcm.py 再用 himalaya
# 抓最新一封补全 sender/subject,并按 last-seen 去重(含启动首触发)。
#
# Gmail:host=imap.gmail.com,port=993,tls=true 且 starttls=false(993 直连 TLS),
#        username=完整邮箱,passwordCMD 输出 App Password。

configurations:
  - host: imap.gmail.com
    port: 993
    tls: true
    tlsOptions:
      starttls: false
    alias: gmail
    username: you@gmail.com
    passwordCMD: "cat /config/secrets/gmail.pass"
    # 启动时也会触发一次 onNewMail —— push-fcm.py 用 last-seen 抑制误推。
    onNewMail: "/app/push-fcm.py gmail"
    onNewMailPost: SKIP
    boxes:
      - mailbox: INBOX
        onNewMail: "/app/push-fcm.py gmail"
        onNewMailPost: SKIP

  # 账号 2/3:复制上面整块,改 alias/username/passwordCMD,并把 onNewMail 的参数改成对应账号名
  # (账号名要和 himalaya config.toml 的 [accounts.<name>] 一致,push-fcm.py 用它抓最新信)。
  # - host: imap.fastmail.com
  #   port: 993
  #   tls: true
  #   tlsOptions:
  #     starttls: false
  #   alias: work
  #   username: you@work.com
  #   passwordCMD: "cat /config/secrets/work.pass"
  #   onNewMail: "/app/push-fcm.py work"
  #   onNewMailPost: SKIP
  #   boxes:
  #     - mailbox: INBOX
  #       onNewMail: "/app/push-fcm.py work"
  #       onNewMailPost: SKIP

  # 例(Yahoo Mail)—— passwordCMD 用 Yahoo 应用专用密码;alias/onNewMail 参数要与
  # config.toml 的账号名 yahoo 一致:
  # - host: imap.mail.yahoo.com
  #   port: 993
  #   tls: true
  #   tlsOptions:
  #     starttls: false
  #   alias: yahoo
  #   username: you@yahoo.com
  #   passwordCMD: "cat /config/secrets/yahoo.pass"
  #   onNewMail: "/app/push-fcm.py yahoo"
  #   onNewMailPost: SKIP
  #   boxes:
  #     - mailbox: INBOX
  #       onNewMail: "/app/push-fcm.py yahoo"
  #       onNewMailPost: SKIP

  # 例(126 邮箱 / 网易)—— passwordCMD 用网易「客户端授权码」(非登录密码);
  #   alias/onNewMail 参数要与 config.toml 的账号名 netease 一致。
  # ⚠️ 网易坑:IMAP 登录要求先发 IMAP ID(RFC 2971),否则被拒「Unsafe Login」。
  #   goimapnotify 用 enableIDCommand: true 开启发 ID(其 issue #42 专为 163/网易加),已验证可登。
  #   (mail-api 收读侧由 imap_pool 自动发 ID,无需配置;这里是推送监听侧。)
  # - host: imap.126.com
  #   port: 993
  #   tls: true
  #   tlsOptions:
  #     starttls: false
  #   alias: netease
  #   username: you@126.com
  #   passwordCMD: "cat /config/secrets/netease.pass"
  #   enableIDCommand: true
  #   onNewMail: "/app/push-fcm.py netease"
  #   onNewMailPost: SKIP
  #   boxes:
  #     - mailbox: INBOX
  #       onNewMail: "/app/push-fcm.py netease"
  #       onNewMailPost: SKIP

  # 例(Outlook / Microsoft 365 / Hotmail)—— OAuth2(XOAUTH2),IMAP 监听 outlook.office365.com:993 直连 TLS。
  # ⚠️⚠️ 微软强制 OAuth2(无密码)。goimapnotify 原生支持:设 xoauth2: true,passwordCMD 输出【裸 access token】
  #   (用同一个 token 助手,goimapnotify 会自己用 username 拼 SASL)。前置同 config.sample.toml 的 Outlook 段
  #   (Azure 注册 client_id → /config/oauth/outlook.json → oauth_enroll.py outlook 一次性授权)。
  # ⚠️ username 必须是【真实邮箱地址】(个人号可能是 @live.com / @hotmail.com / @outlook.com);
  #   写错域名时 token 有效但 IMAP 报 "User is authenticated but not connected"。host 不变。
  # - host: outlook.office365.com
  #   port: 993
  #   tls: true
  #   tlsOptions:
  #     starttls: false
  #   alias: outlook
  #   username: you@outlook.com
  #   xoauth2: true
  #   passwordCMD: "python /app/oauth_token.py outlook"
  #   onNewMail: "/app/push-fcm.py outlook"
  #   onNewMailPost: SKIP
  #   boxes:
  #     - mailbox: INBOX
  #       onNewMail: "/app/push-fcm.py outlook"
  #       onNewMailPost: SKIP
