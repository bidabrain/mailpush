# 例(Outlook / Microsoft 365 / Hotmail)
# ⚠️⚠️ 重大限制:微软已对 Outlook.com 个人账户和多数 M365 账户【停用 Basic Auth】(密码/应用密码
#   登录 IMAP/SMTP),改强制 OAuth2。但本项目 Dockerfile 的 himalaya 只编了 imap,smtp(无 oauth2),
#   所以密码方式很可能直接登录失败。要接 Outlook 需先确认你的账户仍允许 Basic Auth(或老 tenant 临时开了),
#   否则得给 himalaya 加 oauth2 feature 并配 OAuth2 流程——这是另一摊工作,落地前先核实可行性。
# ⚠️ SMTP 是 587 + STARTTLS(不是 465 直连 TLS),encryption.type 用 "start-tls"。
