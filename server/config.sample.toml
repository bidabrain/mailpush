# mailpush · himalaya(引擎)配置 —— 给 mail-api 用(读列表/读正文/发信/回信)。
# 复制为 /config/config.toml 并改成你的账号。
#
# ⚠️ 重要:himalaya v1.2.0 与 mirador 的配置 schema【不一样】(himalaya v1 vs himalaya v2)。
#   - 本文件是 himalaya v1.2.0 格式(backend.type / email / auth.cmd)。
#   - mirador 监听用【另一份】mirador.toml(见 mirador.sample.toml,格式不同)。
#   两份文件引用【同一个密钥文件】/config/secrets/gmail.pass,密钥不重复。
#
# ⚠️ VERIFY:himalaya v1.2.0 每个账号必须有 email 字段(否则报 missing field `email`)。

# ============================================================
# 账号 1:Gmail(App Password。先开 2FA 再生成 16 位码,IMAP/SMTP 共用)
# ============================================================
[accounts.gmail]
default = true
email = "you@gmail.com"

# --- 收信(IMAP) ---
backend.type = "imap"
backend.host = "imap.gmail.com"
backend.port = 993
backend.encryption.type = "tls"
backend.login = "you@gmail.com"
backend.auth.type = "password"
backend.auth.cmd = "cat /config/secrets/gmail.pass"

# --- 发信(SMTP) ---
message.send.backend.type = "smtp"
message.send.backend.host = "smtp.gmail.com"
message.send.backend.port = 465
message.send.backend.encryption.type = "tls"
message.send.backend.login = "you@gmail.com"
message.send.backend.auth.type = "password"
message.send.backend.auth.cmd = "cat /config/secrets/gmail.pass"   # 与 IMAP 共用
# ⚠️ Gmail 通过 SMTP 发信会【自动】把副本存到"已发送",所以这里必须 false。
# 设 true 会让 himalaya 再追加一份副本,结果串进你自己的收件箱(重复邮件)。
# 仅当 provider 的 SMTP 不自动存"已发送"时(某些自建 IMAP),才设 true。
message.send.save-copy = false

# ============================================================
# 账号 2/3:其他 IMAP provider —— 复制上面整块,改账号名/email/host/port/login。
# 改完在 imapnotify.yaml 里也加对应账号块(推送监听)。
# 例(Fastmail):
# ------------------------------------------------------------
# [accounts.work]
# email = "you@work.com"
# backend.type = "imap"
# backend.host = "imap.fastmail.com"
# backend.port = 993
# backend.encryption.type = "tls"
# backend.login = "you@work.com"
# backend.auth.type = "password"
# backend.auth.cmd = "cat /config/secrets/work.pass"
# message.send.backend.type = "smtp"
# message.send.backend.host = "smtp.fastmail.com"
# message.send.backend.port = 465
# message.send.backend.encryption.type = "tls"
# message.send.backend.login = "you@work.com"
# message.send.backend.auth.type = "password"
# message.send.backend.auth.cmd = "cat /config/secrets/work.pass"
# message.send.save-copy = true

