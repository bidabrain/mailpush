# email = "you@126.com"
# backend.type = "imap"
# backend.host = "imap.126.com"
# backend.port = 993
# backend.encryption.type = "tls"
# backend.login = "you@126.com"
# backend.auth.type = "password"
# backend.auth.cmd = "cat /config/secrets/netease.pass"
# message.send.backend.type = "smtp"
# message.send.backend.host = "smtp.126.com"
# message.send.backend.port = 465
# message.send.backend.encryption.type = "tls"
# message.send.backend.login = "you@126.com"
# message.send.backend.auth.type = "password"
# message.send.backend.auth.cmd = "cat /config/secrets/netease.pass"

# 例(Outlook / Microsoft 365 / Hotmail)—— 走 OAuth2(XOAUTH2),不是密码
# ⚠️⚠️ 微软已对 Outlook.com 个人账户和多数 M365【停用 Basic Auth】,只能 OAuth2。本项目支持:
#   1) 在 Azure(entra.microsoft.com)免费注册一个应用,拿 client_id(账户类型勾"个人 Microsoft 账户";
#      开 Allow public client flows;加委托权限 IMAP.AccessAsUser.All / SMTP.Send);
#   2) 【最省事】在内网管理后台(:8098)的「OAuth」区:填账号名(outlook)+ client_id → 点「授权」→
#      按页面提示在浏览器输入设备码、用 Outlook 账户登录同意,即完成(后台自动存好凭据到 /data/oauth/)。
#      (也可手动:建 /data/oauth/outlook.json 写 {"client_id":...},再 docker exec -it mail-api python /app/oauth_enroll.py outlook)
#   3) 下面这样配账号(auth.type=oauth2,cmd 调 oauth_token.py 输出 access token);imapnotify.yaml 同账号见样例。
#   详见仓库根 README。
# ⚠️ SMTP 是 587 + STARTTLS(encryption.type = "start-tls"),IMAP 是 993 TLS。
# ⚠️⚠️ email / login 必须是【真实邮箱地址】(个人号可能是 @live.com / @hotmail.com / @outlook.com 任一域)。
#   写错域名时 OAuth 能授权成功、token 也有效,但 IMAP 会报 "User is authenticated but not connected"
#   (认证放行了、但后端按这个地址找不到邮箱)。host 仍统一 outlook.office365.com,只地址要对。
# ------------------------------------------------------------
# [accounts.outlook]
# email = "you@outlook.com"
# backend.type = "imap"
# backend.host = "outlook.office365.com"
# backend.port = 993
# backend.encryption.type = "tls"
# backend.login = "you@outlook.com"
# backend.auth.type = "oauth2"
# backend.auth.cmd = "python /app/oauth_token.py outlook"
# message.send.backend.type = "smtp"
# message.send.backend.host = "smtp.office365.com"
# message.send.backend.port = 587
# message.send.backend.encryption.type = "start-tls"
# message.send.backend.login = "you@outlook.com"
# message.send.backend.auth.type = "oauth2"
# message.send.backend.auth.cmd = "python /app/oauth_token.py outlook"
